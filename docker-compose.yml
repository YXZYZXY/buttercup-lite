        condition: service_healthy

  fuzzer-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: python -m apps.workers.fuzzer.main
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_ROOT: ${DATA_ROOT:-/data/tasks}
      QUEUE_BLOCK_TIMEOUT: ${QUEUE_BLOCK_TIMEOUT:-2}
      FUZZ_MAX_TOTAL_TIME_SECONDS: ${FUZZ_MAX_TOTAL_TIME_SECONDS:-180}
      FUZZ_TIMEOUT_SECONDS: ${FUZZ_TIMEOUT_SECONDS:-10}
      FUZZ_RSS_LIMIT_MB: ${FUZZ_RSS_LIMIT_MB:-2048}
      FUZZ_MAX_LEN: ${FUZZ_MAX_LEN:-262144}
      FUZZ_ABORT_ON_ERROR: ${FUZZ_ABORT_ON_ERROR:-false}
      FUZZ_FORK_MODE: ${FUZZ_FORK_MODE:-true}
      FUZZ_FORK_JOBS: ${FUZZ_FORK_JOBS:-1}
      FUZZ_IGNORE_CRASHES: ${FUZZ_IGNORE_CRASHES:-true}
      FUZZ_MAX_CRASHES_TO_TRACE: ${FUZZ_MAX_CRASHES_TO_TRACE:-50}
      FUZZ_SEED_FROM_IMPORTED_VALID_CRASHES: ${FUZZ_SEED_FROM_IMPORTED_VALID_CRASHES:-true}
      FUZZ_IMPORTED_VALID_SEED_LIMIT: ${FUZZ_IMPORTED_VALID_SEED_LIMIT:-4}
      ALLOW_IMPORTED_CRASH_FALLBACK: ${ALLOW_IMPORTED_CRASH_FALLBACK:-false}
      ALLOW_HARNESS_SWITCH: ${ALLOW_HARNESS_SWITCH:-false}
      CRASH_SOURCE_POLICY: ${CRASH_SOURCE_POLICY:-live_raw_only}
      REPLAY_TIMEOUT_SECONDS: ${REPLAY_TIMEOUT_SECONDS:-60}
    volumes:
      - ${PROJECT_ROOT:-.}/data:/data
      - ${HOST_HOME}:${HOST_HOME}:ro
    depends_on:
      redis:
        condition: service_healthy

  tracer-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: python -m apps.workers.tracer.main
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_ROOT: ${DATA_ROOT:-/data/tasks}
      QUEUE_BLOCK_TIMEOUT: ${QUEUE_BLOCK_TIMEOUT:-2}
      ALLOW_HARNESS_SWITCH: ${ALLOW_HARNESS_SWITCH:-false}
      CRASH_SOURCE_POLICY: ${CRASH_SOURCE_POLICY:-live_raw_only}
