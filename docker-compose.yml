  protocol-execution-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: python -m apps.workers.protocol_execution_v2_main
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_ROOT: ${DATA_ROOT:-/data/tasks}
      QUEUE_BLOCK_TIMEOUT: ${QUEUE_BLOCK_TIMEOUT:-2}
      PROTO_BACKEND_ROOT: ${PROTO_BACKEND_ROOT:-/opt/proto-backend}
      PROTO_BACKEND_TASK_JSON_NAME: ${PROTO_BACKEND_TASK_JSON_NAME:-protocol/task.json}
    volumes:
      - ${PROJECT_ROOT:-.}/data:/data
      - ${PROTO_BACKEND_ROOT_HOST:-/home/buttercup2/protocol_seed/proto-fuzz-3dockers}:${PROTO_BACKEND_ROOT:-/opt/proto-backend}:ro
      - ${HOST_HOME}:${HOST_HOME}:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy

  patch-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
