        condition: service_healthy

  builder-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: python -m apps.workers.builder.main
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_ROOT: ${DATA_ROOT:-/data/tasks}
      QUEUE_BLOCK_TIMEOUT: ${QUEUE_BLOCK_TIMEOUT:-2}
      SCHEDULER_READY_HOLD_SECONDS: ${SCHEDULER_READY_HOLD_SECONDS:-0}
      BUILD_TIMEOUT_SECONDS: ${BUILD_TIMEOUT_SECONDS:-1200}
    volumes:
      - ${PROJECT_ROOT:-.}/data:/data
      - ${HOST_HOME}:${HOST_HOME}:ro
    depends_on:
