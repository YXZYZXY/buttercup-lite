  seed-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: python -m apps.workers.seed.main
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_ROOT: ${DATA_ROOT:-/data/tasks}
      QUEUE_BLOCK_TIMEOUT: ${QUEUE_BLOCK_TIMEOUT:-2}
      SCHEDULER_READY_HOLD_SECONDS: ${SCHEDULER_READY_HOLD_SECONDS:-0}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-300}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-4}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.35}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-0}
      SEED_FUNCTION_TIMEOUT_SECONDS: ${SEED_FUNCTION_TIMEOUT_SECONDS:-20}
      SEED_MAX_BYTES: ${SEED_MAX_BYTES:-262144}
      SEED_IMPORT_SAMPLE_LIMIT: ${SEED_IMPORT_SAMPLE_LIMIT:-64}
      SEED_GENERATION_ATTEMPTS: ${SEED_GENERATION_ATTEMPTS:-6}
    volumes:
      - ${PROJECT_ROOT:-.}/data:/data
      - ${HOST_HOME}:${HOST_HOME}:ro
