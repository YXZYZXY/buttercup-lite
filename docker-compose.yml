services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  api-server:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: uvicorn apps.api_server.main:app --host 0.0.0.0 --port 8000
    environment:
      API_PORT: ${API_PORT:-8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_ROOT: ${DATA_ROOT:-/data/tasks}
      QUEUE_BLOCK_TIMEOUT: ${QUEUE_BLOCK_TIMEOUT:-2}
      SCHEDULER_READY_HOLD_SECONDS: ${SCHEDULER_READY_HOLD_SECONDS:-0}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ${PROJECT_ROOT:-.}/data:/data
    depends_on:
      redis:
        condition: service_healthy

  downloader-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: python -m apps.workers.downloader_v2_main
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_ROOT: ${DATA_ROOT:-/data/tasks}
      QUEUE_BLOCK_TIMEOUT: ${QUEUE_BLOCK_TIMEOUT:-2}
      SCHEDULER_READY_HOLD_SECONDS: ${SCHEDULER_READY_HOLD_SECONDS:-0}
    volumes:
      - ${PROJECT_ROOT:-.}/data:/data
      - ${HOST_HOME}:${HOST_HOME}:ro
    depends_on:
      redis:
        condition: service_healthy

  scheduler-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: python -m apps.workers.scheduler.main
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_ROOT: ${DATA_ROOT:-/data/tasks}
      QUEUE_BLOCK_TIMEOUT: ${QUEUE_BLOCK_TIMEOUT:-2}
      SCHEDULER_READY_HOLD_SECONDS: ${SCHEDULER_READY_HOLD_SECONDS:-0}
    volumes:
      - ${PROJECT_ROOT:-.}/data:/data
      - ${HOST_HOME}:${HOST_HOME}:ro
    depends_on:
      redis:
        condition: service_healthy

  binary-analysis-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: python -m apps.workers.binary_analysis.main
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_ROOT: ${DATA_ROOT:-/data/tasks}
      QUEUE_BLOCK_TIMEOUT: ${QUEUE_BLOCK_TIMEOUT:-2}
      BINARY_DEFAULT_BACKEND: ${BINARY_DEFAULT_BACKEND:-auto}
      BINARY_WRAPPER_TIMEOUT_SECONDS: ${BINARY_WRAPPER_TIMEOUT_SECONDS:-300}
      IDA_MCP_COMMAND: ${IDA_MCP_COMMAND:-}
      IDA_MCP_TIMEOUT_SECONDS: ${IDA_MCP_TIMEOUT_SECONDS:-1200}
      BINARY_STRINGS_LIMIT: ${BINARY_STRINGS_LIMIT:-20000}
      BINARY_FUNCTIONS_LIMIT: ${BINARY_FUNCTIONS_LIMIT:-20000}
    volumes:
      - ${PROJECT_ROOT:-.}/data:/data
      - ${HOST_HOME}:${HOST_HOME}:ro
    depends_on:
      redis:
        condition: service_healthy

  binary-execution-worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: python -m apps.workers.binary_execution.main
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATA_ROOT: ${DATA_ROOT:-/data/tasks}
      QUEUE_BLOCK_TIMEOUT: ${QUEUE_BLOCK_TIMEOUT:-2}
      BINARY_WRAPPER_TIMEOUT_SECONDS: ${BINARY_WRAPPER_TIMEOUT_SECONDS:-300}
      SEED_IMPORT_SAMPLE_LIMIT: ${SEED_IMPORT_SAMPLE_LIMIT:-64}
      FUZZ_IMPORTED_VALID_SEED_LIMIT: ${FUZZ_IMPORTED_VALID_SEED_LIMIT:-4}
    volumes:
      - ${PROJECT_ROOT:-.}/data:/data
      - ${HOST_HOME}:${HOST_HOME}:ro
    depends_on:
      redis:
        condition: service_healthy

  binary-seed-worker:
